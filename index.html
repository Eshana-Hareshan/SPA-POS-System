<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="assets/lib/fontawesome/css/all.min.css">
    <link rel="stylesheet" href="assets/lib/normalize.css">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

</head>
<body>
<!---------------------------------------- Login --------------------------------------------------------->
<section id="login-page">
    <div class="left-side">
        <div class="login-content">
        </div>
    </div>
    <form class="login-form">
        <div class="top-text">
            <h2 class="greet-msg">Welcome back <i class="fa-regular fa-handshake" style="color:black"></i></h2>
            <h1 class="login-topic">Sign In</h1>
        </div>

        <div class="mb-3">
            <label for="user-name" class="form-label">Name</label>
            <input type="text" class="form-control" id="user-name">
        </div>
        <label for="user-password" class="form-label">Password</label>
        <input type="password" id="user-password" class="form-control" aria-describedby="passwordHelpBlock">
        <div class="d-grid gap-2">
            <button id="submit-btn" class="btn btn-primary" type="button">sign in</button>
        </div>
    </form>
</section>

<!---------------------------------------- Nav Bar ------------------------------------------------------->

<header>
    <nav id="navbar" class="navbar bg-primary position-fixed w-100 top-0">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">POS</a>
            <button id="menu_btn" type="button" class="navbar-toggler">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </button>
        </div>
    </nav>
</header>

<!---------------------------------------- Side Bar ------------------------------------------------------->

<aside id="sidebar" class="position-fixed bottom-0 margin-auto bg-primary-subtle">
    <ul class="navbar-nav justify-content-end flex-grow-1 pe-3">
        <li class="nav-item m-2">
            <div class="nav-link" >Dashboard</div>
        </li>
        <li class="nav-item m-2 " id="customer_sidebar_tab">
            <div class="nav-link">Customer Management</div>
        </li>
        <li class="nav-item m-2" id="item_sidebar_tab">
            <div class="nav-link">Item Management</div>
        </li>
        <li class="nav-item m-2" id="order_sidebar_tab">
            <div class="nav-link">Order Management</div>
        </li>
    </ul>
</aside>

<!--------------------------------------- Customer Management ------------------------------------------>

<section id="customer_content" class="content">
    <div class="container mt-4">

        <h3>Customer Management</h3>

        <form id="customer_form">

            <div class="card p-3 mb-4">
                <div class="row g-3">

                    <div class="col-md-3">
                        <input type="text" id="customer_id_input" class="form-control" placeholder="Customer ID">
                    </div>

                    <div class="col-md-3">
                        <input type="text" id="customer_name_input" class="form-control" placeholder="Customer Name">
                    </div>

                    <div class="col-md-3">
                        <input type="text" id="customer_nic_input" class="form-control" placeholder="NIC">
                    </div>

                    <div class="col-md-3">
                        <input type="text" id="customer_phone_input" class="form-control" placeholder="Contact">
                    </div>

                    <div class="col-md-3">
                        <input type="text" id="customer_address_input" class="form-control" placeholder="Address">
                    </div>

                    <div class="col-12">
                        <button id="customer_save_btn" type="button" class="btn btn-success">
                            SAVE
                        </button>
                        <button id="customer_delete_btn" type="button"  class="btn btn-danger">
                            DELETE
                        </button>
                        <button id="customer_update_btn" type="button" class="btn btn-info">
                            UPDATE
                        </button>
                        <button id="customer_reset_btn" type="reset" class="btn btn-warning">
                            RESET
                        </button>
                    </div>

                </div>
            </div>
        </form>

        <!-- TABLE -->
        <div class="card shadow-sm border-0">
            <div class="card-body p-0">
                <table class="table table-hover align-middle mb-0 text-center">

                    <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>NIC</th>
                        <th>Contact</th>
                        <th>Address</th>
                    </tr>
                    </thead>

                    <tbody id="customer_table_body"></tbody>

                </table>
            </div>
        </div>

    </div>
</section>

<!--------------------------------------- Item Management ------------------------------------------>

<section id="item_content" class="content">
    <div class="container mt-4">

        <h3>Item Management</h3>

        <form id="item_form">

            <div class="card p-3 mb-4">
                <div class="row g-3">

                    <div class="col-md-3">
                        <input type="text" id="item_id" class="form-control" placeholder="Item ID">
                    </div>

                    <div class="col-md-3">
                        <input type="text" id="item_name" class="form-control" placeholder="Item Name">
                    </div>

                    <div class="col-md-3">
                        <input type="text" id="item_quantity" class="form-control" placeholder="Quantity">
                    </div>

                    <div class="col-md-3">
                        <input type="text" id="item_price" class="form-control" placeholder="Price">
                    </div>

                    <div class="col-12">
                        <button id="save_item_btn" type="button" class="btn btn-success">
                            SAVE
                        </button>
                        <button id="delete_item_btn" type="button"  class="btn btn-danger">
                            DELETE
                        </button>
                        <button id="update_item_btn" type="button" class="btn btn-info">
                            UPDATE
                        </button>
                        <button id="reset_item_btn" type="reset" class="btn btn-warning">
                            RESET
                        </button>
                    </div>

                </div>
            </div>
        </form>

        <!-- TABLE -->
        <div class="card shadow-sm border-0">
            <div class="card-body p-0">
                <table class="table table-hover align-middle mb-0 text-center">

                    <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Quantity</th>
                        <th>Price</th>
                    </tr>
                    </thead>

                    <tbody id="item_table_body"></tbody>

                </table>
            </div>
        </div>

    </div>
</section>

<section id="order_content" class="content">
    <div class="container mt-4">

        <h3>Order Management</h3>

        <form class="card p-3 mb-4">
            <div class="row g-3">

                <div class="col-md-3">
                    <input type="text" id="order_id" class="form-control" placeholder="Order ID">
                </div>

                <div class="col-md-3">
                    <select id="order_customer" class="form-control">
                        <option value="">Select Customer</option>
                    </select>
                </div>

                <div class="col-md-3">
                    <input type="text" id="order_customer_name" class="form-control" placeholder="Customer Name" readonly>
                </div>

                <div class="col-md-3">
                    <select id="order_item" class="form-control">
                        <option value="">Select Item</option>
                    </select>
                </div>

                <div class="col-md-3">
                    <input type="text" id="order_item_name" class="form-control" placeholder="Item Name" >
                </div>

                <div class="col-md-3">
                    <input type="text" id="order_item_price" class="form-control" placeholder="Price" >
                </div>

                <div class="col-md-3">
                    <input type="number" id="order_qty" class="form-control" placeholder="Quantity">
                </div>

                <div class="col-12">
                    <button id="add_to_cart_btn" class="btn btn-primary">Add To Cart</button>
                    <button id="place_order_btn" class="btn btn-success">Place Order</button>
                </div>

            </div>
        </form>

        <div class="card p-3 mb-4">
            <h5>Cart</h5>

            <table class="table text-center">
                <thead class="table-dark">
                <tr>
                    <th>Item</th>
                    <th>Qty</th>
                    <th>Price</th>
                    <th>Total</th>
                </tr>
                </thead>
                <tbody id="cart_table"></tbody>
            </table>

            <h4 id="total_display">Total: 0</h4>
        </div>

    </div>
</section>

<script src="assets/lib/jquery-4.0.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
<script src="controller/LoginController.js"></script>
<script type="module" src="controller/SideBarController.js"></script>
<script type="module" src="controller/CustomerController.js"></script>
<script type="module" src="controller/ItemController.js"></script>
<script type="module" src="controller/OrderController.js"></script>
</body>
</html>
