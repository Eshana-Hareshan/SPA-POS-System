<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="assets/lib/fontawesome/css/all.min.css">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

</head>
<body>
<!---------------------------------------------------- Login --------------------------------------------------------->
<section id="login-page">
    <div class="left-side">
        <div class="login-content">
        </div>
    </div>
    <form class="login-form">
        <div class="top-text">
            <h2 class="greet-msg">Welcome back <i class="fa-regular fa-handshake" style="color:black"></i></h2>
            <h1 class="login-topic">Sign In</h1>
        </div>

        <div class="mb-3">
            <label for="user-name" class="form-label">Name</label>
            <input type="text" class="form-control" id="user-name">
        </div>
        <label for="user-password" class="form-label">Password</label>
        <input type="password" id="user-password" class="form-control" aria-describedby="passwordHelpBlock">
        <div class="d-grid gap-2">
            <button id="submit-btn" class="btn btn-primary" type="submit">sign in</button>
        </div>
    </form>
</section>

<section id="customer_content"></section>


<script src="assets/lib/jquery-4.0.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
<script src="controller/LoginController.js"></script>
</body>
</html>
