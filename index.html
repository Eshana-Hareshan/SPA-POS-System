<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="assets/lib/fontawesome/css/all.min.css">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

</head>
<body>
<!---------------------------------------- Login --------------------------------------------------------->
<section id="login-page">
    <div class="left-side">
        <div class="login-content">
        </div>
    </div>
    <form class="login-form">
        <div class="top-text">
            <h2 class="greet-msg">Welcome back <i class="fa-regular fa-handshake" style="color:black"></i></h2>
            <h1 class="login-topic">Sign In</h1>
        </div>

        <div class="mb-3">
            <label for="user-name" class="form-label">Name</label>
            <input type="text" class="form-control" id="user-name">
        </div>
        <label for="user-password" class="form-label">Password</label>
        <input type="password" id="user-password" class="form-control" aria-describedby="passwordHelpBlock">
        <div class="d-grid gap-2">
            <button id="submit-btn" class="btn btn-primary" type="submit">sign in</button>
        </div>
    </form>
</section>

<!---------------------------------------- Nav Bar ------------------------------------------------------->

<header>
    <nav id="navbar" class="navbar bg-primary position-fixed w-100 top-0">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">POS</a>
            <button id="menu_btn" type="button" class="navbar-toggler">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </button>
        </div>
    </nav>
</header>

<!---------------------------------------- Aside Bar ------------------------------------------------------->

<aside id="sidebar" class="position-fixed bottom-0 margin-auto bg-primary-subtle">
    <ul class="navbar-nav justify-content-end flex-grow-1 pe-3">
        <li class="nav-item m-2">
            <div class="nav-link" >Dashboard</div>
        </li>
        <li class="nav-item m-2 text-primary" id="student_sidebar_tab">
            <div class="nav-link">Customer Management</div>
        </li>
        <li class="nav-item m-2" id="course_sidebar_tab">
            <div class="nav-link">Item Management</div>
        </li>
        <li class="nav-item m-2">
            <div class="nav-link">Order Management</div>
        </li>
    </ul>
</aside>

<!--------------------------------------- Customer Management ------------------------------------------>

<section id="customer_content" class="content">
    <div class="container mt-4">

        <h3>Customer Management</h3>

        <form id="customer_form">

            <div class="card p-3 mb-4">
                <div class="row g-3">

                    <div class="col-md-3">
                        <input type="text" id="cust_id" class="form-control" placeholder="Customer ID">
                    </div>

                    <div class="col-md-3">
                        <input type="text" id="cust_name" class="form-control" placeholder="Customer Name">
                    </div>

                    <div class="col-md-3">
                        <input type="text" id="cust_address" class="form-control" placeholder="Address">
                    </div>

                    <div class="col-md-3">
                        <input type="text" id="cust_contact" class="form-control" placeholder="Contact">
                    </div>

                    <div class="col-12">
                        <button id="save_customer_btn" type="submit" class="btn btn-success">
                            SAVE
                        </button>
                        <button id="delete_customer_btn" class="btn btn-danger">
                            DELETE
                        </button>
                        <button id="update_customer_btn" class="btn btn-info">
                            UPDATE
                        </button>
                        <button id="reset_customer_btn" type="reset" class="btn btn-warning">
                            RESET
                        </button>
                    </div>

                </div>
            </div>
        </form>

        <!-- TABLE -->
        <div class="card shadow-sm border-0">
            <div class="card-body p-0">
                <table class="table table-hover align-middle mb-0 text-center">

                    <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Address</th>
                        <th>Contact</th>
                    </tr>
                    </thead>

                    <tbody id="customer_table_body"></tbody>

                </table>
            </div>
        </div>

    </div>
</section>


<script src="assets/lib/jquery-4.0.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
<script src="controller/LoginController.js"></script>
<script src="controller/SideBarController.js"></script>
<script src="controller/CustomerController.js"></script>
</body>
</html>
